<!DOCTYPE html>
<html>
<head>
    <title>Rescue the Signal - Monitor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { margin: 0; background: #0f172a; overflow: hidden; font-family: sans-serif; }
    </style>
</head>
<body>
    <script>
        // 1. Connection setup
        const socket = io("http://localhost:5000"); 
    
        // 2. Initialize variables with default values to prevent crashes
        let snr_percent = 0;
        let snr_db = 0;
        let res_re = 0;
        let res_im = 0;
        let is_winner = false;
        let vecs = []; // Start with empty array
    
        socket.on('update_display', (data) => {
            snr_percent = data.snr_percent;
            snr_db = data.snr_db;
            res_re = data.res_re;
            res_im = data.res_im;
            is_winner = data.is_winner;
            vecs = data.vecs;
        });
    
        function setup() {
            createCanvas(windowWidth, windowHeight);
        }
    
        function draw() {
            background(15, 23, 42);
            
            const bs = { x: 150, y: height - 150 };
            const irs = { x: width/2, y: 150 };
            const ue = { x: width - 150, y: height - 150 };
    
            // --- 1. Draw Obstacle (The Missing Function) ---
            drawObstacleBuilding(width/2, height/2 + 100);
    
            // --- 2. Draw Beams ---
            let beamColor = is_winner ? color(74, 222, 128) : lerpColor(color(239, 68, 68), color(56, 189, 248), snr_percent/100);
            stroke(beamColor);
            strokeWeight(map(snr_percent, 0, 100, 2, 10));
            
            if(snr_percent > 1) {
                line(bs.x, bs.y - 50, irs.x, irs.y); 
                line(irs.x, irs.y, ue.x, ue.y - 20); 
            }
    
            // --- 3. Draw Icons ---
            drawTower(bs.x, bs.y);
            drawIRS(irs.x, irs.y);
            drawPhone(ue.x, ue.y);
    
            // --- 4. UI Elements ---
            drawGauge(80, height/2);
            drawPhasors(width - 150, 200);
    
            if(is_winner) {
                textAlign(CENTER); textSize(60); fill(74, 222, 128); fontStyle(BOLD);
                text("SIGNAL RESCUED!", width/2, height/2);
            }
        }
    
        // --- NEW: THE BUILDING FUNCTION ---
        function drawObstacleBuilding(x, y) {
            push();
            translate(x, y);
            rectMode(CENTER);
            
            // Building main body
            fill(255, 255, 240); 
            stroke(60, 75, 95); strokeWeight(2);
            rect(0, 0, 160, 300, 10);
            
            // Add windows
            noStroke();
            fill(20, 30, 45, 150);
            for(let row = -130; row < 130; row += 25) {
                for(let col = -60; col < 60; col += 30) {
                    rect(col, row, 20, 15, 2);
                }
            }
            
            fill(255, 80); textAlign(CENTER); textSize(16);
            text("BUILDING BLOCKS SIGNAL", 0, 180);
            pop();
        }
    
        // --- ICON AND UI HELPERS ---
        function drawGauge(x, y) {
            push(); translate(x, y);
            noFill(); stroke(51, 65, 85); strokeWeight(4);
            rect(-20, -100, 40, 200, 10);
            fill(is_winner ? '#4ade80' : '#38bdf8'); noStroke();
            let h = map(snr_db, 0, 20, 0, 200); 
            rect(-20, 100, 40, -h, 10);
            fill(255); textAlign(CENTER); textSize(14);
            text(snr_db + " dB", 0, 130);
            text("POWER", 0, -120);
            pop();
        }
    
        function drawPhasors(x, y) {
            push(); translate(x, y);
            stroke(51, 65, 85); noFill(); strokeWeight(2);
            circle(0, 0, 160);
            if (vecs && vecs.length > 0) {
                vecs.forEach(v => {
                    stroke(255, 100);
                    line(0, 0, v.re * 30, -v.im * 30);
                });
            }
            stroke(74, 222, 128); strokeWeight(4);
            line(0, 0, res_re * 20, -res_im * 20);
            fill(255, 150); noStroke(); textSize(12);
            text("PHASE ALIGNMENT", 0, 100);
            pop();
        }
    
        function drawTower(x, y) {
            push(); translate(x, y);
            stroke(255); strokeWeight(2); noFill();
            line(-20, 0, 20, 0); line(-10, 0, 0, -50); line(10, 0, 0, -50); 
            fill(255); ellipse(0, -50, 10);
            noFill(); stroke(255, 100 + sin(frameCount * 0.1) * 155);
            // Arcs now point towards the IRS
            arc(0, -50, 30, 30, -HALF_PI - QUARTER_PI, QUARTER_PI);
            arc(0, -50, 50, 50, -HALF_PI - QUARTER_PI, QUARTER_PI);
            fill(255); noStroke(); textSize(12);
            text("BASE STATION", 0, 25);
            pop();
        }
    
        function drawPhone(x, y) {
            push(); translate(x, y);
            fill(30); stroke(255); strokeWeight(2);
            rect(-15, -30, 30, 50, 5);
            fill(is_winner ? '#4ade80' : '#38bdf8'); noStroke();
            rect(-12, -25, 24, 40, 2);
            fill(255); ellipse(0, 15, 4);
            fill(255); noStroke(); textSize(12);
            text("USER (UE)", 0, 45);
            pop();
        }
    
        function drawIRS(x, y) {
            push(); translate(x, y);
            fill(15, 23, 42); stroke(56, 189, 248); strokeWeight(3);
            rect(-60, -20, 120, 40, 5);
            noStroke(); fill(56, 189, 248, 150);
            for(let i = -50; i <= 50; i += 25) { rect(i - 5, -10, 10, 20, 2); }
            fill(255); textSize(12); text("IRS SURFACE", 0, 45);
            pop();
        }
    </script>
</body>
</html>
